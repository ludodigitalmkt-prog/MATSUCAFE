<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café PDV Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#14532d">
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex h-screen overflow-hidden select-none">

    <div id="app-container" class="flex w-full h-full">
        
        <aside class="hidden md:flex flex-col w-24 bg-green-900 text-white items-center py-6 gap-8 shadow-xl">
            <i class="ph-fill ph-coffee text-4xl mb-4"></i>
            <button class="flex flex-col items-center gap-1 text-green-200 hover:text-white transition"><i class="ph ph-shopping-cart text-2xl"></i><span class="text-xs">PDV</span></button>
            <button class="flex flex-col items-center gap-1 text-green-200 hover:text-white transition"><i class="ph ph-cooking-pot text-2xl"></i><span class="text-xs">KDS</span></button>
            <button class="flex flex-col items-center gap-1 text-green-200 hover:text-white transition"><i class="ph ph-package text-2xl"></i><span class="text-xs">Estoque</span></button>
        </aside>

        <main class="flex-1 flex flex-col h-full overflow-hidden">
            <header class="bg-white shadow-sm p-4 flex justify-between items-center z-10">
                <h1 class="text-xl font-bold text-green-900">Bom dia, Barista!</h1>
                <div class="flex gap-4">
                    <button class="p-2 bg-gray-100 rounded-full hover:bg-gray-200"><i class="ph ph-magnifying-glass text-xl"></i></button>
                </div>
            </header>

            <div class="p-4 flex gap-3 overflow-x-auto hide-scrollbar">
                <button class="px-6 py-2 bg-green-900 text-white font-semibold rounded-full shadow">Cafés Quentes</button>
                <button class="px-6 py-2 bg-white text-gray-600 border border-gray-200 font-semibold rounded-full hover:bg-gray-50">Gelados</button>
                <button class="px-6 py-2 bg-white text-gray-600 border border-gray-200 font-semibold rounded-full hover:bg-gray-50">Comidas</button>
            </div>

            <div id="product-grid" class="flex-1 overflow-y-auto p-4 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 hide-scrollbar">
                </div>
        </main>

        <aside class="w-full md:w-96 bg-white shadow-2xl flex flex-col absolute md:relative bottom-0 h-[60vh] md:h-full z-20 rounded-t-3xl md:rounded-none transform transition-transform translate-y-full md:translate-y-0" id="cart-panel">
            <div class="p-4 bg-green-900 text-white flex justify-between items-center md:rounded-none rounded-t-3xl" onclick="toggleCartMobile()">
                <h2 class="text-lg font-bold flex items-center gap-2"><i class="ph ph-receipt"></i> Pedido Atual</h2>
                <span class="bg-green-700 px-3 py-1 rounded-full text-sm font-bold" id="cart-count">0</span>
            </div>
            
            <div id="cart-items" class="flex-1 overflow-y-auto p-4 flex flex-col gap-4 hide-scrollbar">
                <p class="text-center text-gray-400 mt-10">O carrinho está vazio.</p>
            </div>

            <div class="p-4 border-t border-gray-100 bg-gray-50">
                <div class="flex justify-between mb-2 text-gray-600">
                    <span>Subtotal</span>
                    <span id="subtotal">R$ 0,00</span>
                </div>
                <div class="flex justify-between mb-4 text-xl font-bold text-gray-900">
                    <span>Total</span>
                    <span id="total">R$ 0,00</span>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button class="py-3 px-4 bg-red-100 text-red-700 font-bold rounded-xl hover:bg-red-200" onclick="clearCart()">Cancelar</button>
                    <button class="py-3 px-4 bg-green-900 text-white font-bold rounded-xl shadow-lg hover:bg-green-800 flex items-center justify-center gap-2" onclick="checkout()">
                        <i class="ph ph-wallet"></i> Cobrar
                    </button>
                </div>
            </div>
        </aside>

        <nav class="md:hidden bg-white border-t border-gray-200 flex justify-around p-3 z-30 pb-safe">
            <button class="flex flex-col items-center text-green-900"><i class="ph-fill ph-coffee text-2xl"></i><span class="text-[10px] font-bold">PDV</span></button>
            <button class="flex flex-col items-center text-gray-400 hover:text-green-900"><i class="ph ph-cooking-pot text-2xl"></i><span class="text-[10px]">KDS</span></button>
            <button class="flex flex-col items-center text-gray-400 hover:text-green-900 relative" onclick="toggleCartMobile()">
                <i class="ph ph-shopping-cart text-2xl"></i><span class="text-[10px]">Carrinho</span>
            </button>
        </nav>

    </div> <div id="print-section"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
